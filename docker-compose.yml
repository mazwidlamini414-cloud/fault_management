# ─────────────────────────────────────────────────────────────
#  docker-compose.yml  —  Local development stack
#  Usage:  docker compose up --build
#  App:    http://localhost:8080
#  phpMyAdmin: http://localhost:8081
# ─────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── PHP / Apache App ───────────────────────────────────────
  app:
    build: .
    container_name: busiquip_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_URL: "http://localhost:8080"
      MYSQLHOST: db
      MYSQLPORT: 3306
      MYSQLUSER: busiquip
      MYSQLPASSWORD: busiquip_pass
      MYSQLDATABASE: busiquip_final
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live-reload source during development (comment out for production build)
      - ./:/var/www/html
      # Persist uploads between restarts
      - uploads_data:/var/www/html/uploads

  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: busiquip_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: busiquip_final
      MYSQL_USER: busiquip
      MYSQL_PASSWORD: busiquip_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-import schema on first start
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubusiquip", "-pbusiquip_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── phpMyAdmin (dev only) ──────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: busiquip_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: busiquip
      PMA_PASSWORD: busiquip_pass
    depends_on:
      - db

volumes:
  db_data:
  uploads_data:
